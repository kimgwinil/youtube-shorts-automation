name: Daily YouTube Short

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "오늘 이미 업로드된 경우 강제 실행 (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  daily-short:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      TIMEZONE_NAME: Asia/Seoul
      LOCATION_NAME: Seoul, KR
      LOCATION_LATITUDE: "37.5665"
      LOCATION_LONGITUDE: "126.9780"
      BACKGROUND_DIR: ${{ github.workspace }}/content/backgrounds
      FONT_FILE: ${{ github.workspace }}/runtime-assets/NotoSansCJKkr-Regular.otf
      YOUTUBE_CLIENT_SECRETS_FILE: ${{ github.workspace }}/secrets/client_secret.json
      YOUTUBE_TOKEN_FILE: ${{ github.workspace }}/secrets/token.json
      DEFAULT_VISIBILITY: private
      DEFAULT_CATEGORY_ID: "27"
      SHORTS_HASHTAGS: "#쇼츠 #명언 #고전 #자기계발"
      ENABLE_AI_GENERATION: "true"
      OPENAI_TEXT_MODEL: gpt-4o
      OPENAI_IMAGE_MODEL: gpt-image-1
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare runtime assets
        run: |
          mkdir -p runtime-assets
          curl -L https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/Korean/NotoSansCJKkr-Regular.otf -o runtime-assets/NotoSansCJKkr-Regular.otf

      - name: Prepare runtime files
        run: |
          mkdir -p secrets output/generated_backgrounds output
          printf '%s' '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > secrets/client_secret.json
          printf '%s' '${{ secrets.YOUTUBE_TOKEN_JSON }}' > secrets/token.json

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and upload
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/run_daily.py $FORCE_FLAG

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "Update daily shorts state"
          git pull --rebase origin main
          git push
