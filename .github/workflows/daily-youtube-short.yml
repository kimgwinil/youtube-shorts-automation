name: Daily YouTube Short

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-short:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      TIMEZONE_NAME: Asia/Seoul
      LOCATION_NAME: Seoul, KR
      LOCATION_LATITUDE: "37.5665"
      LOCATION_LONGITUDE: "126.9780"
      BACKGROUND_DIR: ${{ github.workspace }}/content/backgrounds
      FONT_FILE: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
      YOUTUBE_CLIENT_SECRETS_FILE: ${{ github.workspace }}/secrets/client_secret.json
      YOUTUBE_TOKEN_FILE: ${{ github.workspace }}/secrets/token.json
      DEFAULT_VISIBILITY: private
      DEFAULT_CATEGORY_ID: "27"
      SHORTS_HASHTAGS: "#쇼츠 #명언 #고전 #자기계발"
      ENABLE_AI_GENERATION: "true"
      OPENAI_TEXT_MODEL: gpt-5
      OPENAI_IMAGE_MODEL: gpt-image-1
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Prepare runtime files
        run: |
          mkdir -p secrets output/generated_backgrounds output
          printf '%s' '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > secrets/client_secret.json
          printf '%s' '${{ secrets.YOUTUBE_TOKEN_JSON }}' > secrets/token.json

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and upload
        run: |
          python scripts/run_daily.py

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "Update daily shorts state"
          git push
